<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Documents - HUD Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- usamos un bundle UMD completo y más robusto para entornos de navegador -->
    <script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
    
    <style>
        body { font-family: 'Rajdhani', sans-serif; background: #0a0b10; color: #00f2ff; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-bold mb-6 text-center uppercase tracking-widest">HUD de Generación de Documentos</h1>
    <div class="flex justify-center">
        <button id="genBtn" class="bg-cyan-900/30 hover:bg-cyan-900/50 p-6 border-2 border-cyan-400 text-cyan-200 transition-all font-bold tracking-wider">
            GENERAR WORD DE PRUEBA
        </button>
    </div>

    <script>
        document.getElementById('genBtn').addEventListener('click', async () => {
            try {
                // Verificación robusta: la librería docx expone 'Document' directamente en el objeto global en el bundle UMD
                const docxLib = window.docx;
                
                if (!docxLib) {
                    throw new Error("El objeto docx no fue inyectado en la ventana.");
                }

                // Desestructuración desde el objeto global
                const { Document, Packer, Paragraph, TextRun } = docxLib;

                const doc = new Document({
                    sections: [{
                        children: [
                            new Paragraph({
                                children: [
                                    new TextRun({
                                        text: "Reporte Generado por J.A.R.V.I.S.",
                                        bold: true,
                                        size: 40
                                    }),
                                ],
                            }),
                        ],
                    }],
                });

                // Generar blob y descargar
                const blob = await Packer.toBlob(doc);
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "Reporte_Jarvis.docx";
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

            } catch (err) {
                console.error("Detalle del error:", err);
                alert("Error al generar: " + err.message);
            }
        });
    </script>
</body>
</html>
